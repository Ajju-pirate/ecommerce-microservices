version: "3.9"

services:
  user_service:
    build: ./user_service
    ports:
      - "8001:8001"
    volumes:
      - ./user_service:/app
    environment:
      - SECRET_KEY=supersecretkey123
      - DATABASE_URL=sqlite:///./users.db

  catalog_service:
    build: ./catalog_service
    ports:
      - "8002:8002"
    volumes:
      - ./catalog_service:/app
    environment:
      - DATABASE_URL=sqlite:///./catalog.db

  warehouse_service:
    build: ./warehouse_service
    ports:
      - "8003:8003"
    volumes:
      - ./warehouse_service:/app
    environment:
      - DATABASE_URL=sqlite:///./warehouse.db
      - SECRET_KEY=supersecretkey123

  order_service:
    build: ./order_service
    ports:
      - "8004:8004"
    volumes:
      - ./order_service:/app
    environment:
      - DATABASE_URL=sqlite:///./orders.db
      - SECRET_KEY=supersecretkey123
      - WAREHOUSE_SERVICE_URL=http://warehouse_service:8003
      - CATALOG_SERVICE_URL=http://catalog_service:8002

  api_gateway:
    build: ./api_gateway
    ports:
      - "8000:8000"
    volumes:
      - ./api_gateway:/app
    environment:
      - USER_SERVICE_URL=http://user_service:8001
      - CATALOG_SERVICE_URL=http://catalog_service:8002
      - WAREHOUSE_SERVICE_URL=http://warehouse_service:8003
      - ORDER_SERVICE_URL=http://order_service:8004
      - SECRET_KEY=supersecretkey123
    depends_on:
      - user_service
      - catalog_service
      - warehouse_service
      - order_service
